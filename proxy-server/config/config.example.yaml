# Local LFM DLP Proxy — example configuration.
# Copy to %LOCALAPPDATA%\LocalLfmDlpProxy\config.yaml and edit as needed.

server:
  # Bind localhost only. Do not expose to the LAN.
  listen_addr: "127.0.0.1:8787"

upstream:
  base_url: "https://api.anthropic.com"
  timeout_ms: 60000

dlp:
  # On classifier failure/timeout, block rather than allow egress.
  fail_closed: true
  # LFM inference can spike on the first/cold call: on CPU past ~1.5s, and on the
  # AMD iGPU (Vulkan) the first call also pays one-time shader compilation (the
  # GGUF download on a fresh machine is even slower, but that completes before the
  # sidecar reports healthy). Too tight a timeout fail-closes benign requests, so
  # 8s is generous headroom. Warm calls are ~200-300ms; once warm you can lower
  # this for the iGPU (Vulkan)/NPU.
  classify_timeout_ms: 8000
  block_response_mode: "assistant_message"
  rule_guardrail:
    # Deterministic secret/API-key guardrail. The LFM remains the primary
    # classifier; this is the insurance layer for blatant credential leaks.
    # Set to false for an LFM-only pipeline (the model becomes the sole
    # classifier); true keeps both layers (recommended in production).
    enabled: true

inference:
  # MVP backend: a llama.cpp server (llama-server) exposing the OpenAI-compatible
  # chat API. On an AMD Ryzen AI APU, run the Vulkan build of llama-server so it
  # offloads onto the integrated Radeon iGPU (`-ngl 99`); CPU is the fallback.
  # `.\start.ps1` launches the sidecar for you (default -Backend vulkan). Set type
  # to "keyword" to run without a model (dev/CI/demo fallback).
  type: "llama_cpp_http"
  endpoint: "http://127.0.0.1:8791"
  # Label only (audit log + request body). The sidecar serves whatever GGUF it was
  # launched with (start.ps1 -Model), so this is just the human-readable model id;
  # keep it in sync with the loaded checkpoint.
  model: "LFM2.5-1.2B-JP-202606-Conf-Extract"
  warmup_on_start: true
  health_timeout_ms: 500
  # LFM I/O contract (prompt + schema + output parsing). Must match the loaded
  # checkpoint's training format. Built-ins:
  #   jp_confidential_extraction (default) — for the akiFQC LFM2 *-Conf-Extract
  #     Japanese family (e.g. akiFQC/LFM2.5-1.2B-JP-202606-Conf-Extract, or the
  #     350M akiFQC/LFM2-350M-Conf-Extract-Japanese): an 11-category entity
  #     EXTRACTION model (plain-text input, JSON entity-list output); any non-empty
  #     category => BLOCK. The whole family shares this contract, so swapping size
  #     only changes start.ps1 -Model (and this `model` label) — not the profile.
  #   reason_decision — {"reason","decision":ALLOW|BLOCK} generic classifier
  #     (for a general instruct model such as LFM2.5-1.2B-Instruct).
  #   ng_boolean      — {"ng","short_reason"} boolean classifier.
  # Register more in internal/inference/profile.go.
  profile: "jp_confidential_extraction"
  # Optional: override just the profile's system prompt from a file. Use this to
  # pin the deployed checkpoint's EXACT training prompt byte-for-byte if it ever
  # drifts from the built-in (a small model's extraction accuracy is sensitive to
  # full/half-width punctuation and newlines).
  # system_prompt_file: "C:\\path\\to\\system_prompt.txt"

cache:
  # fingerprint -> decision LRU, so each segment is classified once.
  enabled: true
  max_entries: 4096
  persist_sqlite: false

storage:
  type: "sqlite"
  path: "%LOCALAPPDATA%\\LocalLfmDlpProxy\\state\\dlp.db"
  store_raw_text: false        # never persist raw content / secrets
  retention_days: 30

logging:
  level: "info"
  redact_sensitive_values: true
