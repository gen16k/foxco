# Local LFM DLP Proxy — example configuration.
# Copy to %LOCALAPPDATA%\LocalLfmDlpProxy\config.yaml and edit as needed.

server:
  # Bind localhost only. Do not expose to the LAN.
  listen_addr: "127.0.0.1:8787"

upstream:
  base_url: "https://api.anthropic.com"
  timeout_ms: 60000

dlp:
  # On classifier failure/timeout, block rather than allow egress.
  fail_closed: true
  # LFM inference can spike on the first/cold call: on CPU past ~1.5s, and on the
  # AMD iGPU (Vulkan) the first call also pays one-time shader compilation (the
  # GGUF download on a fresh machine is even slower, but that completes before the
  # sidecar reports healthy). Too tight a timeout fail-closes benign requests, so
  # 8s is generous headroom. Warm calls are ~200-300ms; once warm you can lower
  # this for the iGPU (Vulkan)/NPU.
  classify_timeout_ms: 8000
  block_response_mode: "assistant_message"
  rule_guardrail:
    # Deterministic secret/API-key guardrail. The LFM remains the primary
    # classifier; this is the insurance layer for blatant credential leaks.
    enabled: true

inference:
  # The classifier talks to a local OpenAI-compatible LFM server over HTTP. Three
  # backends are launched by `.\start.ps1` (default -Backend auto: NPU -> Vulkan ->
  # CPU); the backend is chosen at launch, not here. start.ps1 passes the matching
  # endpoint/paths/profile as CLI overrides, so the values below are the llama.cpp
  # (Vulkan/CPU) defaults. Set type to "keyword" to run without a model.
  #
  #   * Vulkan/CPU — llama.cpp (llama-server), default paths below.
  #   * NPU        — AMD Ryzen AI via the project's own ONNX shim (npu/npu_server.py).
  #                  Serves the SAME paths (/v1/chat/completions, /health) on its own
  #                  port, with the prompt-only profile (see commented block).
  type: "llama_cpp_http"
  endpoint: "http://127.0.0.1:8791"
  model: "LFM2.5-1.2B"
  warmup_on_start: true
  health_timeout_ms: 500
  # LFM I/O contract (prompt + schema + output parsing). Swap this when a
  # fine-tuned model expects a different format. Built-ins: "reason_decision"
  # (default, JSON-schema constrained), "reason_decision_prompt" (no schema; for
  # OGA/NPU which has no GBNF enforcement), "ng_boolean". Register more in
  # internal/inference/profile.go.
  profile: "reason_decision"
  # Request paths. Empty/omitted = llama.cpp defaults (/v1/chat/completions,
  # /health), which both llama.cpp and the NPU shim serve. Set them only for an OGA
  # runtime that uses a different prefix (e.g. Lemonade's /api/v1/...).
  # chat_path: "/v1/chat/completions"
  # health_path: "/health"
  # Audit-log runtime label only (npu|vulkan|cpu|llama_cpp); does not select the
  # backend. start.ps1 sets this per launched sidecar.
  # backend: "vulkan"
  #
  # --- AMD NPU (Ryzen AI ONNX shim) — set by `.\start.ps1 -Backend npu` ---
  # The shim (npu/npu_server.py) runs LFM2 on the NPU and serves the default paths
  # above on its own port, so only endpoint/profile/backend change.
  # endpoint: "http://127.0.0.1:8792"
  # model: "C:\\Users\\<you>\\ryzenai-lfm2\\LFM2-1.2B-ONNX_rai_1.7.1"  # local ONNX dir
  # profile: "reason_decision_prompt"   # NPU cannot grammar-constrain output
  # backend: "npu"
  #
  # Optional: override just the profile's system prompt from a file (handy while
  # iterating on a fine-tuned model without rebuilding).
  # system_prompt_file: "C:\\path\\to\\system_prompt.txt"

cache:
  # fingerprint -> decision LRU, so each segment is classified once.
  enabled: true
  max_entries: 4096
  persist_sqlite: false

storage:
  type: "sqlite"
  path: "%LOCALAPPDATA%\\LocalLfmDlpProxy\\state\\dlp.db"
  store_raw_text: false        # never persist raw content / secrets
  retention_days: 30

logging:
  level: "info"
  redact_sensitive_values: true
